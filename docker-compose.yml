services:

  # ============================================================
  # Laravel App (PHP-FPM + Nginx) — port 3000
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: failover-panel
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      APP_NAME: "Jezpro Failover Panel"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://10.10.20.153:3000"

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: failover_panel
      DB_USERNAME: failover
      DB_PASSWORD: failover_secret

      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""

      # Failover config (demo values)
      FAILOVER_THIS_SERVER: jh
      FAILOVER_AGENT_TOKEN: "d19a31c71340782edbd9ff33efec974da2576ca5d202763fc5df92b8da0a7dde"
      FAILOVER_HMAC_SECRET: "19e8c1f3dec79bac32caeadd196c4bdb88e751696f5793bc4ab57cba733605c0"
      JH_IP: "103.245.39.108"
      UPCLOUD_IP: "5.6.7.8"
      JH_AGENT_URL: "https://jezpro.zona-karya.id"
      UPCLOUD_AGENT_URL: "https://jezpro.com"
      FAILOVER_ALLOWED_IPS: "172.20.0.5,192.168.1.108,127.0.0.1"

      # Cloudflare (isi dengan nilai asli)
      CLOUDFLARE_API_TOKEN: "${CLOUDFLARE_API_TOKEN}"
      CLOUDFLARE_ZONE_ID: "${CLOUDFLARE_ZONE_ID}"
      CLOUDFLARE_RECORD_ID: "${CLOUDFLARE_RECORD_ID}"
      CLOUDFLARE_DOMAIN: "jezpro.zona-karya.id"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/var/www/html  # Mount source code for development
      - app_storage:/var/www/html/storage
      - app_logs:/var/www/html/storage/logs
    networks:
      - failover-net

  # ============================================================
  # MySQL 8.0
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: failover-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: failover_panel
      MYSQL_USER: failover
      MYSQL_PASSWORD: failover_secret
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - failover-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "failover", "-pfailover_secret"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ============================================================
  # Redis
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: failover-redis
    restart: unless-stopped
    networks:
      - failover-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ============================================================
  # phpMyAdmin (opsional, port 8080)
  # ============================================================
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: failover-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: failover
      PMA_PASSWORD: failover_secret
    depends_on:
      - mysql
    networks:
      - failover-net

volumes:
  mysql_data:
  app_storage:
  app_logs:

networks:
  failover-net:
    driver: bridge
